name: MERN-CICD

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  CLUSTER_NAME: mern-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest ./backend

      - name: Push Backend
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest ./frontend

      - name: Push Frontend
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Connect to EKS
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME
      - name: Make script executable
        run: chmod +x scripts/setup.sh

      - name: Deploy Ingress + Monitoring
        run: |
          cd scripts
          ./setup.sh

      - name: Create namespace
        run: kubectl apply -f k8s/namespace.yml

      - name: Deploy MongoDB
        run: |
          kubectl apply -f k8s/pv.yml
          kubectl apply -f k8s/pvc.yml
          kubectl apply -f k8s/mongodb-statefullset.yml
          kubectl apply -f k8s/mongodb-service.yml 

      - name: Deploy Backend
        run: |
          kubectl apply -f k8s/config-map.yml
          kubectl apply -f k8s/backend-deployment.yml
          kubectl apply -f k8s/backend-service.yml

      - name: Deploy Frontend
        run: |
          kubectl apply -f k8s/frontend-deployment.yml
          kubectl apply -f k8s/frontend-service.yml

      - name: Deploy Ingress
        run: |
          kubectl apply -f k8s/ingress.yml
