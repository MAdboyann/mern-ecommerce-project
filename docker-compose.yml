version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/ecommerce-shop
      ORIGIN: http://localhost:3000

      LOGIN_TOKEN_EXPIRATION: 30d
      OTP_EXPIRATION_TIME: 120000
      PASSWORD_RESET_TOKEN_EXPIRATION: 2m
      COOKIE_EXPIRATION_DAYS: 30
      SECRET_KEY: devsecret123
      PRODUCTION: "false"
      PORT: 8000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mern-network

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mern-network

volumes:
  mongo-data:

networks:
  mern-network:
    driver: bridge
